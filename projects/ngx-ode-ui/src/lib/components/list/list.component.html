<ode-search-input
  *ngIf="isSearchActive"
  [searchInput]="searchInput"
  [searchSubmit]="searchSubmit"
  [attr.placeholder]="searchPlaceholder | translate"
  (onChange)="inputChange.emit($event)"
></ode-search-input>
<div class="toolbar">
  <ng-content select="[toolbar]"></ng-content>
</div>
<div
  class="list-wrapper"
  infiniteScroll
  [scrollWindow]="false"
  (scrolled)="scrolledDown.emit()"
  [infiniteScrollThrottle]="50"
>
  <ul>
    <li
      *ngFor="let item of model"
      (click)="onSelect.emit(item)"
      [class.selected]="isSelected(item)"
      [class.disabled]="isDisabled(item)"
      [ngClass]="ngClass(item)"
      class="lct-list-item"
    >
      <ng-template
        [ngTemplateOutlet]="templateRef"
        [ngTemplateOutletContext]="{ $implicit: item }"
      >
      </ng-template>
    </li>
  </ul>
  <ul *ngIf="storedElements && storedElements.length === 0">
    <li class="no-results">{{ noResultsLabel | translate }}</li>
  </ul>
  <ul *ngIf="model.length === 0 && !loading">
    <li class="no-results">
      <div class="title-message">You have no list</div>
    </li>
  </ul>
  <ul *ngIf="loading">
    <div *ngFor="let i of [1, 2, 3, 4, 5, 6]" class="loading-item">
      <span class="glow-checkbox"></span>
      <span class="glow-text">
        <span>Loading</span> <span>cool</span> <span>state</span>
      </span>
    </div>
  </ul>
</div>
