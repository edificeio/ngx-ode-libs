<!-- <ode-search-input
  *ngIf="isSearchActive"
  [attr.placeholder]="searchPlaceholder"
></ode-search-input> -->
<div class="toolbar">
  <ng-content select="[toolbar]"></ng-content>
</div>
<div class="list-wrapper">
  <ul *ngIf="!loading">
    <li
      *ngFor="let item of model"
      (click)="onSelect.emit(item)"
      [class.selected]="isSelected(item)"
      [class.disabled]="isDisabled(item)"
      [ngClass]="ngClass(item)"
      class="lct-list-item"
    >
      <span class="display-name">{{ item.title }}</span>
    </li>
  </ul>
  <ul *ngIf="model && model.length === 0 && !loading">
    <li class="no-results">{{ noResultsLabel }}</li>
  </ul>
  <ul *ngIf="loading">
    <div *ngFor="let i of model" class="loading-item">
      <span class="glow-checkbox"></span>
      <span class="glow-text">
        <span>Loading</span> <span>cool</span> <span>state</span>
      </span>
    </div>
  </ul>
</div>
