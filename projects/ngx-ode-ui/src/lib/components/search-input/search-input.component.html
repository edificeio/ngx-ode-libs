<form class="search-container" (ngSubmit)="searchInput && searchSubmit()">
  <input
    #searchBox
    class="search-input"
    name="searchTerm"
    type="search"
    (input)="search(searchBox.value)"
  />
  <button class="search-button" *ngIf="searchInput">
    <i class="fa fa-search is-size-4 search-icon"></i>
  </button>
</form>
